<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>船船厨房指南</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .markdown-body h1 {
                @apply text-2xl font-bold mb-4 mt-6 pb-2 border-b border-gray-200;
            }
            .markdown-body h2 {
                @apply text-xl font-bold mb-3 mt-5;
            }
            .markdown-body h3 {
                @apply text-lg font-semibold mb-2 mt-4;
            }
            .markdown-body p {
                @apply mb-3 leading-relaxed;
            }
            .markdown-body ul, .markdown-body ol {
                @apply mb-3 pl-6;
            }
            .markdown-body code {
                @apply bg-gray-100 px-1.5 py-0.5 rounded text-sm;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="sticky top-0 z-50 bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16 gap-4">
                <h1 class="text-xl font-bold text-gray-900 whitespace-nowrap">船船厨房指南</h1>
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="搜索..." 
                    class="flex-1 max-w-sm px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary/50"
                >
                <button id="menuToggle" class="lg:hidden p-2 rounded-md text-gray-500">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col lg:flex-row gap-6">
        <aside id="sidebar" class="w-full lg:w-64 flex-shrink-0 mb-6 lg:mb-0">
            <div class="bg-white rounded-lg shadow-sm p-4 max-h-[calc(100vh-200px)] overflow-y-auto">
                <h2 class="font-semibold text-gray-700 mb-3">目录</h2>
                <div id="toc" class="space-y-1 text-sm"></div>
            </div>
        </aside>

        <main class="flex-1">
            <div id="content" class="bg-white rounded-lg shadow-sm p-6 md:p-8 min-h-screen">
                <div class="text-center py-20 text-gray-500">
                    <p class="text-lg">加载中...</p>
                </div>
            </div>
        </main>
    </div>

    <div id="overlay" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden" onclick="closeSidebar()"></div>

    <script>
        let allFiles = [];
        let allContent = {};
        let allFolders = [];
        let searchResults = [];
        const REPO = 'zhao815/ship-notes';

        document.addEventListener('DOMContentLoaded', async () => {
            console.log('页面加载开始...');
            await loadAllFiles();
            renderTOC();
            setupSearch();
            setupMobileMenu();
            setupHashNavigation();
            renderHome();
            console.log('页面加载完成！');
        });

        async function loadAllFiles() {
            try {
                console.log('正在加载文件列表...');
                
                // 获取根目录内容
                const repoResp = await fetch(`https://api.github.com/repos/${REPO}/contents/`);
                if (!repoResp.ok) throw new Error(`API 错误: ${repoResp.status}`);
                
                const items = await repoResp.json();
                console.log('找到根目录项:', items.length);

                // 遍历每个文件夹
                for (const item of items) {
                    // 只处理文件夹，且跳过隐藏文件夹
                    if (item.type !== 'dir' || item.name.startsWith('.')) {
                        continue;
                    }
                    
                    allFolders.push(item.name);
                    console.log(`扫描文件夹: ${item.name}`);
                    
                    try {
                        // 获取该文件夹内的文件
                        const folderResp = await fetch(item.url);
                        if (!folderResp.ok) {
                            console.warn(`无法访问文件夹 ${item.name}: ${folderResp.status}`);
                            continue;
                        }
                        
                        const folderContent = await folderResp.json();
                        
                        // 确保 folderContent 是数组
                        if (!Array.isArray(folderContent)) {
                            console.warn(`文件夹 ${item.name} 返回的不是数组`);
                            continue;
                        }
                        
                        // 筛选 MD 文件
                        const mdFiles = folderContent.filter(file => 
                            file.type === 'file' && file.name.endsWith('.md')
                        );

                        console.log(`  └─ 找到 ${mdFiles.length} 个 MD 文件`);
                        
                        // 处理每个 MD 文件
                        for (const file of mdFiles) {
                            const fileObj = {
                                folder: item.name,
                                name: file.name.replace('.md', ''),
                                rawUrl: file.download_url,
                                htmlUrl: file.html_url
                            };
                            
                            allFiles.push(fileObj);
                            
                            // 预加载内容
                            try {
                                const contentResp = await fetch(fileObj.rawUrl);
                                if (contentResp.ok) {
                                    const content = await contentResp.text();
                                    allContent[fileObj.folder + '/' + fileObj.name] = content;
                                    console.log(`    ✓ ${file.name}`);
                                }
                            } catch (e) {
                                console.warn(`    ✗ 加载内容失败: ${file.name}`);
                            }
                        }
                    } catch (e) {
                        console.error(`文件夹加载失败 ${item.name}:`, e.message);
                    }
                }

                console.log(`\n=== 加载完成 ===`);
                console.log(`文件夹数: ${allFolders.length}`);
                console.log(`总文件数: ${allFiles.length}`);
                console.log(`已加载内容: ${Object.keys(allContent).length}`);
                
                if (allFiles.length === 0) {
                    document.getElementById('content').innerHTML = '<p class="text-red-500">未找到任何 Markdown 文件</p>';
                }
            } catch (e) {
                console.error('加载失败:', e);
                document.getElementById('content').innerHTML = `<p class="text-red-500">加载失败: ${e.message}</p>`;
            }
        }

        function renderHome() {
            const grouped = {};
            allFiles.forEach(f => {
                if (!grouped[f.folder]) grouped[f.folder] = [];
                grouped[f.folder].push(f);
            });

            let html = `
                <div class="mb-8">
                    <h2 class="text-3xl font-bold mb-2">🍳 船船厨房指南</h2>
                    <p class="text-gray-600">共 ${allFolders.length} 个篇章，${allFiles.length} 篇文章</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            `;

            allFolders.forEach((folder) => {
                const count = grouped[folder]?.length || 0;
                html += `
                    <div class="folder-btn p-4 rounded-lg border border-gray-200 hover:shadow-lg cursor-pointer transition-all bg-gradient-to-br from-blue-50 to-indigo-50" data-folder="${folder}">
                        <h3 class="font-bold text-lg text-primary">${folder}</h3>
                        <p class="text-gray-600 text-sm">${count} 篇</p>
                    </div>
                `;
            });
            
            html += '</div>';
            document.getElementById('content').innerHTML = html;

            // 绑定文件夹按钮
            document.querySelectorAll('.folder-btn').forEach((btn) => {
                btn.addEventListener('click', function() {
                    showFolder(this.dataset.folder);
                });
            });
        }

        function showFolder(folderName) {
            const files = allFiles.filter(f => f.folder === folderName);
            let html = `
                <button class="mb-6 px-3 py-1 text-primary border border-primary rounded hover:bg-blue-50">← 返回</button>
                <h2 class="text-2xl font-bold mb-4">${folderName}</h2>
                <div class="space-y-2">
            `;

            files.forEach((file) => {
                html += `
                    <div class="file-btn p-3 border border-gray-200 rounded hover:shadow cursor-pointer" data-file="${folderName}/${file.name}">
                        <p class="font-medium">${file.name}</p>
                    </div>
                `;
            });

            html += '</div>';
            document.getElementById('content').innerHTML = html;

            // 返回按钮
            document.querySelector('button').addEventListener('click', renderHome);

            // 文件按钮
            document.querySelectorAll('.file-btn').forEach((btn) => {
                btn.addEventListener('click', function() {
                    const [folder, name] = this.dataset.file.split('/');
                    const file = allFiles.find(f => f.folder === folder && f.name === name);
                    if (file) showFile(file);
                });
            });

            closeSidebar();
        }

        function showFile(file) {
            const key = file.folder + '/' + file.name;
            const content = allContent[key] || '（文件为空）';
            const html = marked.parse(content);

            document.getElementById('content').innerHTML = `
                <button class="mb-6 px-3 py-1 text-primary border border-primary rounded hover:bg-blue-50">← 返回</button>
                <div class="text-sm text-gray-500 mb-4">${file.folder} / ${file.name}</div>
                <div class="markdown-body">${html}</div>
            `;

            document.querySelector('button').addEventListener('click', () => showFolder(file.folder));
            closeSidebar();
        }

        function renderTOC() {
            const grouped = {};
            allFiles.forEach(f => {
                if (!grouped[f.folder]) grouped[f.folder] = [];
                grouped[f.folder].push(f);
            });

            let html = '';
            Object.entries(grouped).forEach(([folder, files]) => {
                html += `<div class="mb-3">
                    <div class="font-medium cursor-pointer p-2 hover:bg-gray-100 rounded toggle-folder" data-folder="${folder}">
                        ${folder} (${files.length})
                    </div>
                    <div class="folder-items hidden pl-3 space-y-1">`;
                
                files.forEach(file => {
                    html += `<div class="text-sm p-1 hover:bg-gray-100 rounded cursor-pointer file-link" data-file="${folder}/${file.name}">${file.name}</div>`;
                });
                
                html += `</div></div>`;
            });

            document.getElementById('toc').innerHTML = html;

            // 折叠功能
            document.querySelectorAll('.toggle-folder').forEach(btn => {
                btn.addEventListener('click', function() {
                    this.nextElementSibling.classList.toggle('hidden');
                });
            });

            // 文件链接
            document.querySelectorAll('.file-link').forEach(link => {
                link.addEventListener('click', function() {
                    const [folder, name] = this.dataset.file.split('/');
                    const file = allFiles.find(f => f.folder === folder && f.name === name);
                    if (file) showFile(file);
                });
            });
        }

        function setupSearch() {
            const input = document.getElementById('searchInput');
            let timeout;
            input.addEventListener('input', (e) => {
                clearTimeout(timeout);
                timeout = setTimeout(() => {
                    const q = e.target.value.toLowerCase().trim();
                    if (!q) {
                        renderHome();
                        return;
                    }

                    console.log(`搜索: "${q}"`);
                    searchResults = [];
                    
                    for (const file of allFiles) {
                        const content = allContent[file.folder + '/' + file.name] || '';
                        if (content.toLowerCase().includes(q)) {
                            const idx = content.toLowerCase().indexOf(q);
                            const snippet = '...' + content.slice(Math.max(0, idx - 30), idx + 100) + '...';
                            searchResults.push({ file, snippet });
                        }
                    }

                    console.log(`搜索结果: ${searchResults.length}`);

                    if (searchResults.length === 0) {
                        document.getElementById('content').innerHTML = '<p class="text-gray-500">未找到搜索结果</p>';
                    } else {
                        let html = `<h3 class="text-lg font-bold mb-4">搜索结果 (${searchResults.length})</h3><div class="space-y-3">`;
                        searchResults.forEach((r, idx) => {
                            html += `
                                <div class="search-item p-3 border rounded hover:shadow cursor-pointer" data-result-index="${idx}">
                                    <p class="font-medium text-primary">${r.file.folder} / ${r.file.name}</p>
                                    <p class="text-sm text-gray-600">${r.snippet.replace(new RegExp(q, 'gi'), m => `<mark class="bg-yellow-100">${m}</mark>`)}</p>
                                </div>
                            `;
                        });
                        html += '</div>';
                        document.getElementById('content').innerHTML = html;

                        document.querySelectorAll('.search-item').forEach((item) => {
                            item.addEventListener('click', function() {
                                const idx = parseInt(this.dataset.resultIndex);
                                showFile(searchResults[idx].file);
                            });
                        });
                    }
                }, 300);
            });
        }

        function setupMobileMenu() {
            document.getElementById('menuToggle').addEventListener('click', () => {
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('overlay');
                sidebar.classList.toggle('hidden');
                overlay.classList.toggle('hidden');
            });
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.add('hidden');
            document.getElementById('overlay').classList.add('hidden');
        }

        function setupHashNavigation() {
            if (location.hash) {
                const [folder, name] = decodeURIComponent(location.hash.slice(1)).split('/');
                const file = allFiles.find(f => f.folder === folder && f.name === name);
                if (file) showFile(file);
            }

            window.addEventListener('hashchange', () => {
                if (!location.hash) {
                    renderHome();
                    return;
                }
                const [folder, name] = decodeURIComponent(location.hash.slice(1)).split('/');
                const file = allFiles.find(f => f.folder === folder && f.name === name);
                if (file) showFile(file);
            });
        }
    </script>
</body>
</html>
