<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>船船厨房指南</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .markdown-body h1 {
                @apply text-2xl font-bold mb-4 mt-6 pb-2 border-b border-gray-200;
            }
            .markdown-body h2 {
                @apply text-xl font-bold mb-3 mt-5;
            }
            .markdown-body h3 {
                @apply text-lg font-semibold mb-2 mt-4;
            }
            .markdown-body p {
                @apply mb-3 leading-relaxed;
            }
            .markdown-body ul, .markdown-body ol {
                @apply mb-3 pl-6;
            }
            .markdown-body code {
                @apply bg-gray-100 px-1.5 py-0.5 rounded text-sm;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="sticky top-0 z-50 bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16 gap-4">
                <h1 class="text-xl font-bold text-gray-900 whitespace-nowrap">船船厨房指南</h1>
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="搜索..." 
                    class="flex-1 max-w-sm px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary/50"
                >
                <button id="menuToggle" class="lg:hidden p-2 rounded-md text-gray-500">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col lg:flex-row gap-6">
        <aside id="sidebar" class="w-full lg:w-64 flex-shrink-0 mb-6 lg:mb-0">
            <div class="bg-white rounded-lg shadow-sm p-4 max-h-[calc(100vh-200px)] overflow-y-auto">
                <h2 class="font-semibold text-gray-700 mb-3">目录</h2>
                <div id="toc" class="space-y-1 text-sm"></div>
            </div>
        </aside>

        <main class="flex-1">
            <div id="content" class="bg-white rounded-lg shadow-sm p-6 md:p-8 min-h-screen">
                <div class="text-center py-20 text-gray-500">
                    <p class="text-lg">加载中...</p>
                </div>
            </div>
        </main>
    </div>

    <div id="overlay" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden" onclick="closeSidebar()"></div>

    <script>
        let allFiles = [];
        let allContent = {};
        let searchResults = [];
        const REPO = 'zhao815/ship-notes';

        document.addEventListener('DOMContentLoaded', async () => {
            console.log('页面加载开始...');
            await loadAllFiles();
            renderTOC();
            setupSearch();
            setupMobileMenu();
            setupHashNavigation();
            renderHome();
            console.log('页面加载完成！');
        });

        async function loadAllFiles() {
            try {
                console.log('正在加载文件列表...');
                
                // 获取根目录内容
                const repoResp = await fetch(`https://api.github.com/repos/${REPO}/contents/`);
                if (!repoResp.ok) throw new Error(`API 错误: ${repoResp.status}`);
                
                const items = await repoResp.json();
                console.log('根目录项:', items.map(i => i.name));

                // 遍历每个文件夹
                for (const item of items) {
                    if (item.type !== 'dir' || item.name.startsWith('.')) continue;
                    
                    console.log(`扫描文件夹: ${item.name}`);
                    
                    try {
                        const folderResp = await fetch(item.url);
                        if (!folderResp.ok) throw new Error(`无法访问文件夹 ${item.name}`);
                        
                        const files = await folderResp.json();
                        
                        for (const file of files) {
                            if (!file.name.endsWith('.md')) continue;
                            
                            const fileObj = {
                                folder: item.name,
                                name: file.name.replace('.md', ''),
                                rawUrl: file.download_url,
                                htmlUrl: file.html_url
                            };
                            
                            // 预加载内容
                            try {
                                const contentResp = await fetch(fileObj.rawUrl);
                                if (contentResp.ok) {
                                    allContent[fileObj.folder + '/' + fileObj.name] = await contentResp.text();
                                    console.log(`✓ 加载: ${fileObj.folder}/${fileObj.name}`);
                                }
                            } catch (e) {
                                console.warn(`加载内容失败: ${fileObj.folder}/${fileObj.name}`);
                            }
                            
                            allFiles.push(fileObj);
                        }
                    } catch (e) {
                        console.error(`文件夹加载失败 ${item.name}:`, e);
                    }
                }

                console.log(`总共加载 ${allFiles.length} 个文件，内容数 ${Object.keys(allContent).length}`);
                
                if (allFiles.length === 0) {
                    document.getElementById('content').innerHTML = '<p class="text-red-500">未找到任何文档</p>';
                }
            } catch (e) {
                console.error('加载失败:', e);
                document.getElementById('content').innerHTML = `<p class="text-red-500">加载失败: ${e.message}</p>`;
            }
        }

        function renderHome() {
            const grouped = {};
            allFiles.forEach(f => {
                if (!grouped[f.folder]) grouped[f.folder] = [];
                grouped[f.folder].push(f);
            });

            let html = `
                <div class="mb-8">
                    <h2 class="text-3xl font-bold mb-2">🍳 船船厨房指南</h2>
                    <p class="text-gray-600">共 ${Object.keys(grouped).length} 个篇章，${allFiles.length} 篇文章</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            `;

            for (const [folder, files] of Object.entries(grouped)) {
                html += `
                    <div class="folder-btn p-4 rounded-lg border border-gray-200 hover:shadow-lg cursor-pointer transition-all bg-gradient-to-br from-blue-50 to-indigo-50">
                        <h3 class="font-bold text-lg text-primary">${folder}</h3>
                        <p class="text-gray-600 text-sm">${files.length} 篇</p>
                    </div>
                `;
            }
            
            html += '</div>';
            document.getElementById('content').innerHTML = html;

            // 绑定文件夹按钮
            document.querySelectorAll('.folder-btn').forEach((btn, idx) => {
                const folders = Object.keys(grouped);
                btn.onclick = () => showFolder(folders[idx]);
            });
        }

        function showFolder(folderName) {
            const files = allFiles.filter(f => f.folder === folderName);
            let html = `
                <button class="mb-6 px-3 py-1 text-primary border border-primary rounded hover:bg-blue-50">← 返回</button>
                <h2 class="text-2xl font-bold mb-4">${folderName}</h2>
                <div class="space-y-2">
            `;

            files.forEach((file, idx) => {
                html += `
                    <div class="file-btn p-3 border border-gray-200 rounded hover:shadow cursor-pointer">
                        <p class="font-medium">${file.name}</p>
                    </div>
                `;
            });

            html += '</div>';
            document.getElementById('content').innerHTML = html;

            // 返回按钮
            document.querySelector('button').onclick = renderHome;

            // 文件按钮
            document.querySelectorAll('.file-btn').forEach((btn, idx) => {
                btn.onclick = () => showFile(files[idx]);
            });
        }

        function showFile(file) {
            const key = file.folder + '/' + file.name;
            const content = allContent[key] || '（文件为空）';
            const html = marked.parse(content);

            document.getElementById('content').innerHTML = `
                <button class="mb-6 px-3 py-1 text-primary border border-primary rounded hover:bg-blue-50">← 返回</button>
                <div class="text-sm text-gray-500 mb-4">${file.folder} / ${file.name}</div>
                <div class="markdown-body">${html}</div>
            `;

            document.querySelector('button').onclick = () => showFolder(file.folder);
        }

        function renderTOC() {
            const grouped = {};
            allFiles.forEach(f => {
                if (!grouped[f.folder]) grouped[f.folder] = [];
                grouped[f.folder].push(f);
            });

            let html = '';
            for (const [folder, files] of Object.entries(grouped)) {
                html += `<div class="mb-3">
                    <div class="font-medium cursor-pointer p-2 hover:bg-gray-100 rounded toggle-folder">${folder}</div>
                    <div class="folder-items hidden pl-3 space-y-1">`;
                
                files.forEach(file => {
                    html += `<div class="text-sm p-1 hover:bg-gray-100 rounded cursor-pointer file-link" data-file="${folder}/${file.name}">${file.name}</div>`;
                });
                
                html += `</div></div>`;
            }

            document.getElementById('toc').innerHTML = html;

            // 折叠功能
            document.querySelectorAll('.toggle-folder').forEach(btn => {
                btn.onclick = function() {
                    this.nextElementSibling.classList.toggle('hidden');
                };
            });

            // 文件链接
            document.querySelectorAll('.file-link').forEach(link => {
                link.onclick = function() {
                    const [folder, name] = this.dataset.file.split('/');
                    const file = allFiles.find(f => f.folder === folder && f.name === name);
                    if (file) showFile(file);
                    closeSidebar();
                };
            });
        }

        function setupSearch() {
            const input = document.getElementById('searchInput');
            input.addEventListener('input', (e) => {
                const q = e.target.value.toLowerCase().trim();
                if (!q) {
                    renderHome();
                    return;
                }

                searchResults = [];
                for (const file of allFiles) {
                    const content = allContent[file.folder + '/' + file.name] || '';
                    if (content.toLowerCase().includes(q)) {
                        const idx = content.toLowerCase().indexOf(q);
                        const snippet = '...' + content.slice(Math.max(0, idx - 30), idx + 100) + '...';
                        searchResults.push({ file, snippet });
                    }
                }

                if (searchResults.length === 0) {
                    document.getElementById('content').innerHTML = '<p class="text-gray-500">未找到搜索结果</p>';
                } else {
                    let html = `<h3 class="text-lg font-bold mb-4">搜索结果 (${searchResults.length})</h3><div class="space-y-3">`;
                    searchResults.forEach((r, idx) => {
                        html += `
                            <div class="search-item p-3 border rounded hover:shadow cursor-pointer">
                                <p class="font-medium text-primary">${r.file.folder} / ${r.file.name}</p>
                                <p class="text-sm text-gray-600">${r.snippet.replace(new RegExp(q, 'gi'), m => `<mark class="bg-yellow-100">${m}</mark>`)}</p>
                            </div>
                        `;
                    });
                    html += '</div>';
                    document.getElementById('content').innerHTML = html;

                    document.querySelectorAll('.search-item').forEach((item, idx) => {
                        item.onclick = () => showFile(searchResults[idx].file);
                    });
                }
            });
        }

        function setupMobileMenu() {
            document.getElementById('menuToggle').onclick = () => {
                document.getElementById('sidebar').classList.toggle('hidden');
                document.getElementById('overlay').classList.toggle('hidden');
            };
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.add('hidden');
            document.getElementById('overlay').classList.add('hidden');
        }

        function setupHashNavigation() {
            if (location.hash) {
                const [folder, name] = decodeURIComponent(location.hash.slice(1)).split('/');
                const file = allFiles.find(f => f.folder === folder && f.name === name);
                if (file) showFile(file);
            }

            window.onhashchange = () => {
                const [folder, name] = decodeURIComponent(location.hash.slice(1)).split('/');
                const file = allFiles.find(f => f.folder === folder && f.name === name);
                if (file) showFile(file);
            };
        }
    </script>
</body>
</html>
